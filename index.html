<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ڕاپۆرتی کۆتایی</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; direction: rtl; margin: 0; padding: 10px; }
        .report-card { width: 58mm; margin: auto; padding: 5px; border: 1px solid #eee; }
        .header img { width: 60px; margin-bottom: 5px; }
        .header h2 { font-size: 16px; margin: 5px 0; }
        .line { border-top: 1px dashed black; margin: 10px 0; }
        .info { text-align: right; font-size: 13px; margin: 5px 0; }
        .range-box { border: 1px solid black; padding: 10px; margin: 10px 0; font-size: 16px; font-weight: bold; }
        .total-box { background: #000; color: #fff; padding: 10px; margin-top: 10px; font-size: 20px; }
        button { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; margin-bottom: 10px; border-radius: 5px; font-family: inherit; }
        @media print { button { display: none; } .report-card { border: none; width: 100%; } }
    </style>
</head>
<body>

    <button onclick="window.print()">پرنتکردنی ڕاپۆرت</button>

    <div class="report-card">
        <div class="header">
            <img src="https://arduexcel.github.io/img/ms-icon-144x144.png">
            <h2>تێرمناڵی سه‌ره‌كی سلێمانی</h2>
            <h3 style="margin:0; font-size:14px;">ڕاپۆرتی کۆتایی شەفت</h3>
        </div>
        
        <div class="line"></div>
        <div class="info" id="u-name">کارمەند: بار دەبێت...</div>
        <div class="info" id="p-date">کات: --:--</div>
        
        <div id="r-box" class="range-box">لە پسووڵە: -- <br> بۆ پسووڵە: --</div>
        
        <div class="line"></div>
        <div class="info" id="t-count">کۆی پسووڵە: 0</div>
        <div class="total-box" id="t-money">0 د.ع</div>
        
        <p style="font-size: 10px; margin-top: 15px;">واژۆی كارمه‌ند</p>
    </div>

    <script>
        // هەمان کۆنفیکی سیستمە ئەسڵییەکەت
        const config = { 
            apiKey: "AIzaSyCuUstd-6d0E-EbmQipv2mWk-bA55ajpQ0", 
            authDomain: "car-system-4594d.firebaseapp.com", 
            projectId: "car-system-4594d" 
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(config); }
        const db = firebase.firestore();

        async function initReport() {
            // 1. هەوڵدان بۆ گرتنی ناو لە لینک
            const params = new URLSearchParams(window.location.search);
            let user = params.get('user');

            // 2. ئەگەر لە لینک نەبوو، لە localStorage بیخوێنەرەوە
            if (!user) {
                user = localStorage.getItem("terminalUser");
            }

            if (!user) {
                document.getElementById('u-name').innerText = "هەڵە: ناوی کارمەند نەدۆزرایەوە";
                return;
            }

            document.getElementById('u-name').innerText = "کارمەند: " + user;
            document.getElementById('p-date').innerText = "کات: " + new Date().toLocaleString('en-GB');

            // وەرگرتنی بەروار ڕێک وەک شێوازی ناو سیستمەکەت
            const today = new Date().toLocaleDateString('en-CA');

            try {
                const snap = await db.collection("Invoices").doc(today).collection("AllInvoices")
                                    .where("employee", "==", user)
                                    .where("status", "==", "active")
                                    .get();

                let total = 0, count = 0, nos = [];

                snap.forEach(doc => {
                    const d = doc.data();
                    nos.push(parseInt(d.invoiceNo));
                    total += parseInt(d.price || 0);
                    count++;
                });

                if (count > 0) {
                    document.getElementById('r-box').innerHTML = `لە پسووڵە: ${Math.min(...nos)} <br> بۆ پسووڵە: ${Math.max(...nos)}`;
                    document.getElementById('t-count').innerText = "کۆی پسووڵە: " + count;
                    document.getElementById('t-money').innerText = total.toLocaleString() + " د.ع";
                } else {
                    document.getElementById('r-box').innerText = "هیچ داتایەک نەدۆزرایەوە";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('r-box').innerText = "هەڵە لە پەیوەندی داتابەیس";
            }
        }

        window.onload = initReport;
    </script>
</body>
</html>
